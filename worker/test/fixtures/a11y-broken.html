<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Absichtlich fehlerhafte Seite</title>
  <style>
    /* Schlechter Kontrast: hellgrau auf weiss */
    .low-contrast { color: #bbbbbb; background-color: #ffffff; }
  </style>
</head>
<body>
  <!-- Fehlendes lang-Attribut am html-Element (oben) -->

  <!-- Bild ohne alt-Text -->
  <img src="logo.png">

  <!-- Text mit schlechtem Kontrast -->
  <p class="low-contrast">Dieser Text ist kaum lesbar.</p>

  <!-- Eingabefeld ohne zugeordnetes Label -->
  <input type="text" name="suche">

  <!-- Button ohne erkennbaren Namen -->
  <button></button>
</body>
</html>
